name: Backend Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'docker-compose.yaml'
      - '.github/workflows/backend.yml'
  workflow_dispatch:

env:
  COOLIFY_BASE: https://coolify.mirek-rpi.org
  COOLIFY_APP_UUID: c1x0tbz4cg7gdx3ftltz699v

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deploy
        env:
          TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "COOLIFY_API_TOKEN secret not set; relying on Coolify GitHub App auto-deploy."
            exit 0
          fi
          curl -fsSL -X POST \
            -H "Authorization: Bearer $TOKEN" \
            "$COOLIFY_BASE/api/v1/deploy?uuid=$COOLIFY_APP_UUID&force=false"
