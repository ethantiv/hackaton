name: Backend Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
      - '.github/workflows/backend.yml'
  workflow_dispatch:

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify webhook
        env:
          WEBHOOK: ${{ secrets.COOLIFY_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "COOLIFY_DEPLOY_WEBHOOK secret not set; relying on Coolify GitHub App auto-deploy."
            exit 0
          fi
          curl -fsSL -X POST "$WEBHOOK"
