name: Backend Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  workflow_dispatch:

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify webhook
        env:
          WEBHOOK: ${{ secrets.COOLIFY_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "COOLIFY_DEPLOY_WEBHOOK secret not set" >&2
            exit 1
          fi
          curl -fsSL -X POST "$WEBHOOK"
