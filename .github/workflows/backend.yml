name: Backend Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'docker-compose.yaml'
      - '.github/workflows/backend.yml'
  workflow_dispatch:

env:
  COOLIFY_BASE: https://coolify.mirek-rpi.org
  COOLIFY_APP_UUID: k3740dkxfg4otahb6rn6hvw2

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deploy
        env:
          TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "COOLIFY_API_TOKEN secret not set; relying on Coolify GitHub App auto-deploy."
            exit 0
          fi
          curl -isS -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/json" \
            -A "GitHubActions/1.0 (curl)" \
            "$COOLIFY_BASE/api/v1/deploy?uuid=$COOLIFY_APP_UUID&force=false" \
            | tee /tmp/resp.txt
          status=$(head -n 1 /tmp/resp.txt | awk '{print $2}')
          if [ "$status" != "200" ] && [ "$status" != "201" ]; then
            echo "::error::Coolify deploy returned HTTP $status"
            exit 1
          fi
