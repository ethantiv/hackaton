name: iOS Build & Deploy

on:
  push:
    branches: [main, ios]
    paths:
      - 'ios/**'
      - '.github/workflows/ios.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Build .app for simulator (no signing)
        working-directory: ios
        run: |
          xcodebuild \
            -project FieldNotebook.xcodeproj \
            -scheme FieldNotebook \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/ \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Zip .app
        working-directory: ios/build/Build/Products/Release-iphonesimulator
        run: zip -ry FieldNotebook.zip FieldNotebook.app

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: FieldNotebook-simulator
          path: ios/build/Build/Products/Release-iphonesimulator/FieldNotebook.zip
          retention-days: 14
