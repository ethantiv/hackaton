name: iOS Build & Deploy

on:
  push:
    branches: [main, ios]
    paths:
      - 'ios/**'
      - '.github/workflows/ios.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Build .app for simulator (no signing)
        working-directory: ios
        run: |
          xcodebuild \
            -project FieldNotebook.xcodeproj \
            -scheme FieldNotebook \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/ \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Zip .app
        working-directory: ios/build/Build/Products/Release-iphonesimulator
        run: zip -ry FieldNotebook.zip FieldNotebook.app

      - name: Upload to Appetize
        env:
          APPETIZE_TOKEN: ${{ secrets.APPETIZE_API_TOKEN }}
          APPETIZE_PUBLIC_KEY: ${{ secrets.APPETIZE_PUBLIC_KEY }}
        run: |
          if [ -z "$APPETIZE_TOKEN" ] || [ -z "$APPETIZE_PUBLIC_KEY" ]; then
            echo "Appetize secrets missing" >&2
            exit 1
          fi
          curl -fsSL -X POST \
            "https://${APPETIZE_TOKEN}@api.appetize.io/v1/apps/${APPETIZE_PUBLIC_KEY}" \
            -F "file=@ios/build/Build/Products/Release-iphonesimulator/FieldNotebook.zip" \
            -F "platform=ios"

      - name: Print stable preview URL
        run: |
          echo "Tester URL: https://appetize.io/app/${{ secrets.APPETIZE_PUBLIC_KEY }}" \
            >> "$GITHUB_STEP_SUMMARY"
