services:
  notebook:
    build:
      context: .
      dockerfile: Dockerfile
    image: 'field-notebook-backend:latest'
    expose:
      - '3000'
    volumes:
      - 'field-notebook-data:/data'
    environment:
      - 'JWT_SECRET=${SERVICE_BASE64_64_JWT}'
      - 'DATABASE_PATH=/data/app.db'
      - 'PHOTOS_PATH=/data/photos'
      - 'PORT=3000'
    healthcheck:
      test: ['CMD-SHELL', 'bun -e "fetch(\"http://localhost:3000/health\").then(r => { if (!r.ok) process.exit(1) })" || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  field-notebook-data:
